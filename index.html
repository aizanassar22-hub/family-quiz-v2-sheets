<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسابقة العائلية اليومية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Google Fonts for Arabic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800 antialiased flex flex-col justify-between">

    <!-- Header -->
    <header class="bg-white shadow-sm py-4 px-6 sticky top-0 z-10">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <h1 class="text-xl md:text-2xl font-bold text-indigo-700 flex items-center gap-2">
                <span>🏆</span> المسابقة العائلية اليومية
            </h1>
            <div id="date-display" class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full text-sm font-bold">
                2026 / 07 / 20
            </div>
        </div>
    </header>

    <!-- Main Content Container -->
    <main class="max-w-4xl w-full mx-auto px-4 py-8 flex-grow flex flex-col justify-center items-center">
        
        <!-- Loading Spinner -->
        <div id="loading-state" class="text-center py-12">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-4 border-indigo-700 border-t-transparent mb-4"></div>
            <p class="text-gray-500 font-medium">جاري تحميل مسابقة اليوم النشطة...</p>
        </div>

        <!-- Quiz Content View -->
        <div id="quiz-state" class="hidden w-full bg-white rounded-2xl shadow-md p-6 md:p-8 transition-all duration-300">
            <!-- Question Box -->
            <div class="mb-8">
                <span class="text-xs uppercase tracking-wider font-bold text-indigo-500 block mb-1">سؤال اليوم</span>
                <h2 id="question-text" class="text-xl md:text-2xl font-bold text-gray-900 leading-relaxed"></h2>
            </div>

            <!-- Options Grid -->
            <div id="options-container" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                <!-- Options will be injected via JavaScript -->
            </div>

            <!-- Action Footer -->
            <div class="flex justify-end">
                <button id="submit-btn" disabled class="bg-indigo-300 text-white font-bold px-8 py-3 rounded-xl cursor-not-allowed transition-all duration-200 shadow-sm">
                    تأكيد الإجابة
                </button>
            </div>
        </div>

        <!-- Feedback & Results View -->
        <div id="result-state" class="hidden w-full bg-white rounded-2xl shadow-md p-6 md:p-8 text-center transition-all duration-300">
            <div id="result-icon" class="text-6xl mb-4"></div>
            <h3 id="result-title" class="text-2xl font-bold mb-2"></h3>
            <p id="result-message" class="text-gray-600 mb-6"></p>
            <div class="bg-gray-50 p-4 rounded-xl inline-block font-medium mb-6">
                الإجابة الصحيحة كانت: <span id="correct-answer-text" class="font-bold text-emerald-600"></span>
            </div>
        </div>

        <!-- Error / Rest State -->
        <div id="empty-state" class="hidden w-full bg-white rounded-2xl shadow-md p-8 text-center max-w-md transition-all duration-300">
            <div class="text-5xl mb-4">☕</div>
            <h3 class="text-xl font-bold text-gray-900 mb-2">استراحة اليوم!</h3>
            <p class="text-gray-500 text-sm leading-relaxed" id="empty-message">لا توجد مسابقة مجدولة لتاريخ اليوم في جدول البيانات. انتظرونا في الأيام القادمة!</p>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-100 py-4 text-center text-xs text-gray-400">
        تطبيق المسابقة العائلية اليومية © 2026
    </footer>

    <!-- Application JavaScript Layer -->
    <script>
        // رابط الـ API المحدث والأخير المتوافق تماماً مع صيغة البيانات الجديدة
        const API_URL = "https://script.google.com/macros/s/AKfycbzWdj6fqe8zavS8sE6av7SGuOaC6UIfAIjFSLGK0CyxQnONe7-tsm4y2jepsywnTK6c/exec";
        
        let currentQuizData = null;
        let selectedOptionIndex = null;

        // Fetch daily quiz from the sheet via API
        async function fetchDailyQuiz() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                document.getElementById('loading-state').classList.add('hidden');
                
                // التعديل الجذري لقراءة المتغير المباشر data.data المتوافق مع إصدار Apps Script 7
                if (data && data.status === "success" && data.data) {
                    currentQuizData = data.data;
                    renderQuiz(currentQuizData);
                } else {
                    showEmptyState("لا توجد مسابقة نشطة حالياً.");
                }
            } catch (error) {
                console.error("Error loading quiz:", error);
                document.getElementById('loading-state').classList.add('hidden');
                showEmptyState("فشل الاتصال بخادم البيانات. يرجى التحقق من اتصالك بالإنترنت.");
            }
        }

        function renderQuiz(quiz) {
            document.getElementById('question-text').innerText = quiz.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            quiz.options.forEach((option, index) => {
                const button = document.createElement('button');
                button.className = "w-full text-right p-4 rounded-xl border-2 border-gray-200 hover:border-indigo-500 hover:bg-indigo-50/50 transition-all font-medium flex items-center justify-between group";
                button.innerHTML = `
                    <span class="text-gray-800">${option}</span>
                    <span class="h-5 w-5 rounded-full border border-gray-300 flex items-center justify-center group-hover:border-indigo-500 text-transparent text-xs font-bold">✓</span>
                `;
                button.onclick = () => selectOption(index, button);
                container.appendChild(button);
            });

            document.getElementById('quiz-state').classList.remove('hidden');
        }

        function selectOption(index, element) {
            selectedOptionIndex = index;
            
            const buttons = document.getElementById('options-container').children;
            for (let btn of buttons) {
                btn.classList.remove('border-indigo-600', 'bg-indigo-50');
                btn.classList.add('border-gray-200');
                btn.querySelector('span:last-child').classList.remove('bg-indigo-600', 'text-white', 'border-indigo-600');
            }

            element.classList.remove('border-gray-200');
            element.classList.add('border-indigo-600', 'bg-indigo-50');
            const indicator = element.querySelector('span:last-child');
            indicator.classList.add('bg-indigo-600', 'text-white', 'border-indigo-600');

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.classList.remove('bg-indigo-300', 'cursor-not-allowed');
            submitBtn.classList.add('bg-indigo-700', 'hover:bg-indigo-800', 'active:scale-98');
        }

        function verifyAnswer() {
            if (selectedOptionIndex === null || !currentQuizData) return;

            document.getElementById('quiz-state').classList.add('hidden');
            const resultState = document.getElementById('result-state');
            
            const correctNum = parseInt(currentQuizData.correctAnswer);
            const userNum = selectedOptionIndex + 1;

            const iconEl = document.getElementById('result-icon');
            const titleEl = document.getElementById('result-title');
            const msgEl = document.getElementById('result-message');
            const correctTextEl = document.getElementById('correct-answer-text');

            correctTextEl.innerText = currentQuizData.options[correctNum - 1];

            if (userNum === correctNum) {
                iconEl.innerText = "🎉";
                titleEl.innerText = "إجابة صحيحة ورائعة!";
                titleEl.className = "text-2xl font-bold mb-2 text-emerald-600";
                msgEl.innerText = "أحسنت صنعاً، لقد حصلت على الدرجة الكاملة في سؤال اليوم.";
            } else {
                iconEl.innerText = "❌";
                titleEl.innerText = "للأسف، إجابة غير صحيحة";
                titleEl.className = "text-2xl font-bold mb-2 text-rose-600";
                msgEl.innerText = "حظاً أوفر في مسابقة يوم غد إن شاء الله، حاول مجدداً!";
            }

            resultState.classList.remove('hidden');
        }

        function showEmptyState(message) {
            const emptyState = document.getElementById('empty-state');
            if (message) {
                document.getElementById('empty-message').innerText = message;
            }
            emptyState.classList.remove('hidden');
        }

        document.getElementById('submit-btn').onclick = verifyAnswer;
        window.onload = fetchDailyQuiz;
    </script>
</body>
</html>
