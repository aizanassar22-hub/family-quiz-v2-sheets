<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسابقة العائلية اليومية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col justify-between">

    <!-- Header / Admin Bar -->
    <header class="bg-purple-900 text-white text-xs py-2 px-4 flex justify-between items-center shadow-md">
        <div>
            <span class="bg-purple-800 px-2 py-1 rounded text-purple-200 font-bold">
                <i class="fas fa-user-shield ml-1"></i> وضع المسابقة النشط
            </span>
        </div>
        <button id="exit-btn" onclick="resetUserSelection()" class="bg-purple-700 hover:bg-purple-600 text-white px-3 py-1 rounded transition font-medium">
            تغيير الفئة المختارة
        </button>
    </header>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-6 max-w-2xl flex-grow">
        
        <!-- App Title & Leaderboard Button -->
        <div class="flex justify-between items-center mb-6">
            <button id="top-leaderboard-btn" onclick="openLeaderboard()" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl shadow font-bold text-sm flex items-center gap-2 transition">
                <i class="fas fa-trophy"></i> لوحة الصدارة
            </button>
            <div class="text-center">
                <h1 class="text-2xl md:text-3xl font-extrabold text-indigo-900 flex items-center justify-center gap-2">
                    <i class="fas fa-trophy text-amber-500"></i> المسابقة العائلية اليومية
                </h1>
            </div>
            <span id="current-date-badge" class="bg-slate-200 text-slate-600 text-xs px-2.5 py-1 rounded-full font-mono">
                2026-07-22
            </span>
        </div>

        <!-- Dynamic Content Card -->
        <div id="app-card" class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-8 transition-all duration-300">
            <!-- Dynamic Injection via JS -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-100 bg-white">
        منصة المسابقة العائلية اليومية © 2026
    </footer>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-6 relative border border-slate-100">
            <div class="flex justify-between items-center mb-6 pb-3 border-b border-slate-100">
                <h3 class="text-xl font-bold text-indigo-950 flex items-center gap-2">
                    <i class="fas fa-medal text-amber-500 text-2xl"></i> لوحة الصدارة والترتيب
                </h3>
                <button onclick="closeLeaderboard()" class="text-slate-400 hover:text-slate-600 bg-slate-100 px-3 py-1 rounded-lg text-sm font-bold">
                    إغلاق <i class="fas fa-times mr-1"></i>
                </button>
            </div>

            <!-- Gender Tabs -->
            <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
                <button id="tab-women" onclick="switchTab('women')" class="flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 bg-pink-600 text-white shadow-md">
                    فئات النساء 👩
                </button>
                <button id="tab-men" onclick="switchTab('men')" class="flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 text-slate-600">
                    فئات الرجال 👨
                </button>
            </div>

            <!-- Leaderboard Items Container -->
            <div id="leaderboard-list" class="space-y-3 max-h-80 overflow-y-auto pr-1"></div>
        </div>
    </div>

    <!-- Application Script -->
    <script>
        const QUESTIONS_CSV_URL = ''; 
        const SCRIPT_WEB_APP_URL = ''; 

        const DEFAULT_QUESTION = {
            question: "ما هو أول مساجد الإسلام؟",
            options: ["المسجد الحرام", "مسجد قباء", "المسجد النبوي", "المسجد الأقصى"],
            correctAnswer: "مسجد قباء"
        };

        let currentQuizData = null;
        let selectedOptionIndex = null;
        let timerInterval = null;
        let timeLeft = 60;
        let activeTab = 'women';
        let currentCategory = localStorage.getItem('family_quiz_category') || null;

        function getScores() {
            const saved = localStorage.getItem('family_quiz_scores');
            if (saved) return JSON.parse(saved);
            
            const initial = {
                women: [
                    { id: 'w1', name: 'نساء 1', points: 0 },
                    { id: 'w2', name: 'نساء 2', points: 0 },
                    { id: 'w3', name: 'نساء 3', points: 0 }
                ],
                men: [
                    { id: 'm1', name: 'رجال 1', points: 0 },
                    { id: 'm2', name: 'رجال 2', points: 0 },
                    { id: 'm3', name: 'رجال 3', points: 0 }
                ]
            };
            localStorage.setItem('family_quiz_scores', JSON.stringify(initial));
            return initial;
        }

        function saveScores(scores) {
            localStorage.setItem('family_quiz_scores', JSON.stringify(scores));
        }

        function hasAnsweredToday(catId) {
            const answered = JSON.parse(localStorage.getItem('family_quiz_answered') || '{}');
            const today = '2026-07-22';
            return answered[catId] === today;
        }

        function markAsAnsweredToday(catId) {
            const answered = JSON.parse(localStorage.getItem('family_quiz_answered') || '{}');
            answered[catId] = '2026-07-22';
            localStorage.setItem('family_quiz_answered', JSON.stringify(answered));
        }

        function normalizeText(str) {
            if (!str) return '';
            return String(str)
                .trim()
                .replace(/[\u064B-\u0652]/g, '')
                .replace(/[أإآ]/g, 'ا')
                .replace(/ة/g, 'ه')
                .replace(/ى/g, 'ي')
                .toLowerCase();
        }

        document.addEventListener('DOMContentLoaded', () => {
            if (!currentCategory) {
                renderCategorySelector();
            } else {
                checkAndLoadQuiz();
            }
        });

        function renderCategorySelector() {
            const appCard = document.getElementById('app-card');
            appCard.innerHTML = `
                <div class="text-center space-y-6 py-4">
                    <h2 class="text-xl md:text-2xl font-extrabold text-indigo-950">اختر الفئة المشاركة للبدء</h2>
                    <p class="text-slate-500 text-sm">حدد الفئة التي تمثلها ليتم احتساب نقاط المسابقة لحسابكم</p>
                    
                    <div class="space-y-4 max-w-md mx-auto text-right">
                        <div>
                            <label class="block text-xs font-bold text-pink-700 mb-2">فئات النساء 👩</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="setCategory('w1', 'نساء 1', 'women')" class="p-3 bg-pink-50 hover:bg-pink-100 border border-pink-200 rounded-xl font-bold text-pink-900 text-sm text-center transition">نساء 1</button>
                                <button onclick="setCategory('w2', 'نساء 2', 'women')" class="p-3 bg-pink-50 hover:bg-pink-100 border border-pink-200 rounded-xl font-bold text-pink-900 text-sm text-center transition">نساء 2</button>
                                <button onclick="setCategory('w3', 'نساء 3', 'women')" class="p-3 bg-pink-50 hover:bg-pink-100 border border-pink-200 rounded-xl font-bold text-pink-900 text-sm text-center transition">نساء 3</button>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-indigo-700 mb-2">فئات الرجال 👨</label>
                            <div class="grid grid-cols-3 gap-2">
                                <button onclick="setCategory('m1', 'رجال 1', 'men')" class="p-3 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-xl font-bold text-indigo-900 text-sm text-center transition">رجال 1</button>
                                <button onclick="setCategory('m2', 'رجال 2', 'men')" class="p-3 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-xl font-bold text-indigo-900 text-sm text-center transition">رجال 2</button>
                                <button onclick="setCategory('m3', 'رجال 3', 'men')" class="p-3 bg-indigo-50 hover:bg-indigo-100 border border-indigo-200 rounded-xl font-bold text-indigo-900 text-sm text-center transition">رجال 3</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }

        function setCategory(id, name, type) {
            currentCategory = { id, name, type };
            localStorage.setItem('family_quiz_category', JSON.stringify(currentCategory));
            checkAndLoadQuiz();
        }

        function resetUserSelection() {
            localStorage.removeItem('family_quiz_category');
            currentCategory = null;
            renderCategorySelector();
        }

        function checkAndLoadQuiz() {
            if (typeof currentCategory === 'string') {
                try { currentCategory = JSON.parse(currentCategory); } catch(e){}
            }

            if (currentCategory && hasAnsweredToday(currentCategory.id)) {
                renderAlreadyAnsweredScreen();
            } else {
                loadQuizData();
            }
        }

        async function loadQuizData() {
            if (!QUESTIONS_CSV_URL) {
                currentQuizData = DEFAULT_QUESTION;
                renderQuizScreen();
                return;
            }

            try {
                const response = await fetch(QUESTIONS_CSV_URL);
                const csvText = await response.text();
                const parsedData = parseSimpleCSV(csvText);

                if (parsedData && parsedData.length > 0) {
                    const row = parsedData[0];
                    currentQuizData = {
                        question: row['السؤال'] || row['Question'] || DEFAULT_QUESTION.question,
                        options: [
                            row['الخيار 1'] || row['Option 1'] || DEFAULT_QUESTION.options[0],
                            row['الخيار 2'] || row['Option 2'] || DEFAULT_QUESTION.options[1],
                            row['الخيار 3'] || row['Option 3'] || DEFAULT_QUESTION.options[2],
                            row['الخيار 4'] || row['Option 4'] || DEFAULT_QUESTION.options[3]
                        ],
                        correctAnswer: row['الإجابة الصحيحة'] || row['الاجابة الصحيحة'] || row['Correct Answer'] || DEFAULT_QUESTION.correctAnswer
                    };
                } else {
                    currentQuizData = DEFAULT_QUESTION;
                }
            } catch (err) {
                currentQuizData = DEFAULT_QUESTION;
            }

            renderQuizScreen();
        }

        function parseSimpleCSV(text) {
            const lines = text.split('\n').filter(l => l.trim().length > 0);
            if (lines.length < 2) return [];

            const headers = lines[0].split(',').map(h => h.trim().replace(/^"|"$/g, ''));
            const result = [];

            for (let i = 1; i < lines.length; i++) {
                const values = lines[i].split(',').map(v => v.trim().replace(/^"|"$/g, ''));
                const obj = {};
                headers.forEach((h, idx) => {
                    obj[h] = values[idx] || '';
                });
                result.push(obj);
            }
            return result;
        }

        function renderQuizScreen() {
            selectedOptionIndex = null;
            timeLeft = 60;

            const categoryName = currentCategory ? currentCategory.name : 'رجال 1';

            const appCard = document.getElementById('app-card');
            appCard.innerHTML = `
                <div class="bg-amber-50 rounded-xl p-3 mb-6 flex justify-between items-center text-amber-800 font-bold text-sm border border-amber-200">
                    <span><i class="fas fa-clock text-amber-600 ml-1"></i> الوقت المتبقي:</span>
                    <span id="timer-display" class="text-lg font-extrabold text-amber-600">${timeLeft} ثانية</span>
                </div>

                <div class="flex justify-between items-center text-xs font-bold text-indigo-600 mb-3">
                    <span class="bg-indigo-50 text-indigo-800 px-3 py-1.5 rounded-lg border border-indigo-100 flex items-center gap-1">
                        <i class="fas fa-user-check text-indigo-600"></i> الفئة: ${categoryName}
                    </span>
                    <span class="bg-slate-100 text-slate-700 px-3 py-1.5 rounded-lg">مسابقة اليوم</span>
                </div>

                <h2 class="text-xl md:text-2xl font-bold text-slate-800 text-center my-6 leading-relaxed">
                    ${currentQuizData.question}
                </h2>

                <div class="space-y-3 mb-6" id="options-container">
                    ${currentQuizData.options.map((opt, idx) => `
                        <button onclick="selectOption(${idx})" id="opt-btn-${idx}" 
                                class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-200 transition-all font-semibold text-slate-700 flex items-center justify-between group">
                            <span>${opt}</span>
                            <div class="w-5 h-5 rounded-full border-2 border-slate-300 group-hover:border-indigo-500 flex items-center justify-center">
                                <div class="w-2.5 h-2.5 rounded-full bg-indigo-600 hidden" id="radio-dot-${idx}"></div>
                            </div>
                        </button>
                    `).join('')}
                </div>

                <div id="feedback-box" class="hidden rounded-2xl p-4 text-center font-bold mb-6 transition-all duration-300"></div>

                <button id="submit-btn" disabled onclick="evaluateAndSubmit()" 
                        class="w-full py-4 bg-slate-300 text-slate-500 rounded-2xl font-bold text-lg shadow transition duration-200 flex items-center justify-center gap-2 cursor-not-allowed">
                    <i class="fas fa-save"></i> حفظ والخروج من المسابقة
                </button>
            `;

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const timerEl = document.getElementById('timer-display');
                if (timerEl) timerEl.textContent = `${timeLeft} ثانية`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    evaluateAndSubmit();
                }
            }, 1000);
        }

        window.selectOption = function(index) {
            selectedOptionIndex = index;
            const container = document.getElementById('options-container');
            const buttons = container.querySelectorAll('button');
            
            buttons.forEach((btn, idx) => {
                const dot = document.getElementById(`radio-dot-${idx}`);
                if (idx === index) {
                    btn.className = "w-full text-right p-4 rounded-2xl border-2 border-indigo-600 bg-indigo-50/50 transition-all font-bold text-indigo-900 flex items-center justify-between shadow-sm";
                    if (dot) dot.classList.remove('hidden');
                } else {
                    btn.className = "w-full text-right p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-200 transition-all font-semibold text-slate-700 flex items-center justify-between";
                    if (dot) dot.classList.add('hidden');
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.className = "w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold text-lg shadow-lg transition duration-200 flex items-center justify-center gap-2 cursor-pointer";
        };

        window.evaluateAndSubmit = function() {
            clearInterval(timerInterval);

            const rawCorrectVal = currentQuizData.correctAnswer;
            let isCorrect = false;
            let displayAnswer = rawCorrectVal;

            if (selectedOptionIndex !== null) {
                const selectedText = currentQuizData.options[selectedOptionIndex];

                if (/^[1-4]$/.test(String(rawCorrectVal).trim())) {
                    const correctIdx = parseInt(rawCorrectVal.trim()) - 1;
                    displayAnswer = currentQuizData.options[correctIdx] || rawCorrectVal;
                    if (selectedOptionIndex === correctIdx) isCorrect = true;
                } else {
                    const normSelected = normalizeText(selectedText);
                    const normCorrect = normalizeText(rawCorrectVal);
                    if (normSelected === normCorrect || normSelected.includes(normCorrect) || normCorrect.includes(normSelected)) {
                        isCorrect = true;
                    }
                }
            }

            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.classList.remove('hidden');

            if (isCorrect) {
                feedbackBox.className = "rounded-2xl p-4 text-center font-bold mb-6 bg-emerald-50 text-emerald-700 border border-emerald-200";
                feedbackBox.innerHTML = `<i class="fas fa-check-circle ml-1"></i> إجابة صحيحة! أحسنت صنعاً.`;
                addPointsToCategory(10);
            } else {
                feedbackBox.className = "rounded-2xl p-4 text-center font-bold mb-6 bg-red-50 text-red-600 border border-red-200";
                feedbackBox.innerHTML = `<i class="fas fa-times-circle ml-1"></i> إجابة غير صحيحة. الإجابة الصحيحة هي: (${displayAnswer})`;
            }

            // Lock this category for today
            if (currentCategory) {
                markAsAnsweredToday(currentCategory.id);
            }

            sendToBackend(isCorrect ? 10 : 0);

            const buttons = document.getElementById('options-container').querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.onclick = renderSuccessScreen;
            submitBtn.innerHTML = `<i class="fas fa-arrow-left"></i> المتابعة للنتيجة`;
        };

        function addPointsToCategory(pts) {
            if (!currentCategory) return;
            const scores = getScores();
            const type = currentCategory.type;
            const catId = currentCategory.id;

            const categoryList = scores[type];
            const target = categoryList.find(c => c.id === catId);
            if (target) {
                target.points += pts;
                saveScores(scores);
            }
        }

        async function sendToBackend(pts) {
            if (!SCRIPT_WEB_APP_URL) return;
            try {
                await fetch(SCRIPT_WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        category: currentCategory ? currentCategory.name : 'عام',
                        points: pts,
                        timestamp: new Date().toISOString()
                    })
                });
            } catch(e) {
                console.warn("Could not log score:", e);
            }
        }

        function renderAlreadyAnsweredScreen() {
            const appCard = document.getElementById('app-card');
            appCard.innerHTML = `
                <div class="text-center py-8 space-y-6">
                    <div class="w-20 h-20 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-4xl mx-auto shadow-sm">
                        <i class="fas fa-lock"></i>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-2xl font-extrabold text-slate-800">لقد شاركت فئة (${currentCategory ? currentCategory.name : ''}) اليوم!</h2>
                        <p class="text-slate-500 font-medium">تم تسجيل إجابة هذه الفئة سابقاً ولا يمكن إعادة الإجابة حتى المسابقة القادمة.</p>
                    </div>
                    <button onclick="openLeaderboard()" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-bold text-lg shadow-lg transition duration-200 flex items-center justify-center gap-2">
                        <i class="fas fa-trophy"></i> عرض لوحة الصدارة والترتيب
                    </button>
                </div>
            `;
        }

        function renderSuccessScreen() {
            const appCard = document.getElementById('app-card');
            appCard.innerHTML = `
                <div class="text-center py-8 space-y-6">
                    <div class="w-20 h-20 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-4xl mx-auto shadow-lg shadow-emerald-200">
                        <i class="fas fa-check"></i>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-2xl font-extrabold text-slate-800">تم تسجيل إجابتك بنجاح!</h2>
                        <p class="text-slate-500 font-medium">شكراً لمشاركتك. تم حفظ نقاط فئة (${currentCategory ? currentCategory.name : 'المشاركة'}) بنجاح.</p>
                    </div>
                    <button onclick="openLeaderboard()" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-bold text-lg shadow-lg transition duration-200 flex items-center justify-center gap-2">
                        <i class="fas fa-trophy"></i> عرض لوحة الصدارة والترتيب
                    </button>
                </div>
            `;
        }

        function openLeaderboard() {
            renderLeaderboardList();
            document.getElementById('leaderboard-modal').classList.remove('hidden');
        }

        function closeLeaderboard() {
            document.getElementById('leaderboard-modal').classList.add('hidden');
        }

        function switchTab(gender) {
            activeTab = gender;
            const tabMen = document.getElementById('tab-men');
            const tabWomen = document.getElementById('tab-women');

            if (gender === 'men') {
                tabMen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 bg-indigo-600 text-white shadow-md";
                tabWomen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 text-slate-600";
            } else {
                tabWomen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 bg-pink-600 text-white shadow-md";
                tabMen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 text-slate-600";
            }

            renderLeaderboardList();
        }

        function renderLeaderboardList() {
            const listContainer = document.getElementById('leaderboard-list');
            const scores = getScores();
            const items = scores[activeTab] || [];

            const sortedItems = [...items].sort((a, b) => b.points - a.points);

            listContainer.innerHTML = sortedItems.map((item, index) => `
                <div class="flex items-center justify-between p-4 rounded-2xl ${index === 0 ? 'bg-amber-50 border border-amber-200' : 'bg-slate-50 border border-slate-100'}">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-extrabold ${index === 0 ? 'text-amber-800 bg-amber-200' : 'text-slate-600 bg-slate-200'} px-2 py-1 rounded-md">#${index + 1}</span>
                        <span class="font-bold text-slate-800">${item.name}</span>
                    </div>
                    <div class="text-left">
                        <span class="text-lg font-black text-indigo-900">${item.points}</span>
                        <span class="text-xs text-slate-400 block">نقاط</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
