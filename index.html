<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسابقة العائلية اليومية</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- PapaParse for CSV Parsing -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap');
        body { font-family: 'Tajawal', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800 flex flex-col justify-between">

    <!-- Header / Admin Bar -->
    <header class="bg-purple-900 text-white text-xs py-2 px-4 flex justify-between items-center shadow-md">
        <div>
            <span class="bg-purple-800 px-2 py-1 rounded text-purple-200 font-bold">
                <i class="fas fa-tools ml-1"></i> وضع المشرف والاختبار نشط (تم إلغاء قيود الحظر)
            </span>
        </div>
        <button id="exit-btn" class="bg-purple-700 hover:bg-purple-600 text-white px-3 py-1 rounded transition font-medium">
            الخروج لوضع المتسابق
        </button>
    </header>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-6 max-w-2xl flex-grow">
        
        <!-- App Title & Date Bar -->
        <div class="flex justify-between items-center mb-6">
            <button id="top-leaderboard-btn" class="bg-amber-500 hover:bg-amber-600 text-white px-4 py-2 rounded-xl shadow font-bold text-sm flex items-center gap-2 transition">
                <i class="fas fa-trophy"></i> لوحة الصدارة
            </button>
            <div class="text-center">
                <h1 class="text-2xl md:text-3xl font-extrabold text-indigo-900 flex items-center justify-center gap-2">
                    <i class="fas fa-trophy text-amber-500"></i> المسابقة العائلية اليومية
                </h1>
            </div>
            <span id="current-date-badge" class="bg-slate-200 text-slate-600 text-xs px-2.5 py-1 rounded-full font-mono">
                2026-07-22
            </span>
        </div>

        <!-- Dynamic Content Card -->
        <div id="app-card" class="bg-white rounded-3xl shadow-xl border border-slate-100 p-6 md:p-8 transition-all duration-300">
            <!-- Content will be injected dynamically via JS -->
            <div class="text-center py-12">
                <i class="fas fa-spinner fa-spin text-4xl text-indigo-600 mb-4"></i>
                <p class="text-slate-500 font-medium">جاري تحميل المسابقة والبيانات...</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="text-center py-4 text-xs text-slate-400 border-t border-slate-100 bg-white">
        منصة المسابقة العائلية اليومية © 2026
    </footer>

    <!-- Leaderboard Modal -->
    <div id="leaderboard-modal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 hidden">
        <div class="bg-white rounded-3xl shadow-2xl max-w-lg w-full p-6 relative animate-fade-in border border-slate-100">
            <div class="flex justify-between items-center mb-6 pb-3 border-b border-slate-100">
                <h3 class="text-xl font-bold text-indigo-950 flex items-center gap-2">
                    <i class="fas fa-medal text-amber-500 text-2xl"></i> لوحة الصدارة والترتيب
                </h3>
                <button id="close-modal-btn" class="text-slate-400 hover:text-slate-600 bg-slate-100 px-3 py-1 rounded-lg text-sm font-bold">
                    إغلاق <i class="fas fa-times mr-1"></i>
                </button>
            </div>

            <!-- Gender Filter Tabs -->
            <div class="flex bg-slate-100 p-1 rounded-xl mb-6">
                <button id="tab-men" class="flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 text-slate-600">
                    فئات الرجال 👨
                </button>
                <button id="tab-women" class="flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 bg-pink-600 text-white shadow-md">
                    فئات النساء 👩
                </button>
            </div>

            <!-- Leaderboard List -->
            <div id="leaderboard-list" class="space-y-3 max-h-80 overflow-y-auto pr-1">
                <!-- Injected via JS -->
            </div>
        </div>
    </div>

    <!-- Application Logic Script -->
    <script>
        // Data URLs
        const QUESTIONS_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vT5Ais944E571OByi0L8yX7M2N31KkI3_00k_U2e4ZgQ_6fM_5aJ141M7kX2V1L9S3C3R1X8M3K2S/pub?output=csv'; // Standard Quiz CSV URL
        const SCRIPT_WEB_APP_URL = ''; // Apps Script URL for saving responses if available

        // Global State
        let questionsData = [];
        let currentQuestion = null;
        let selectedOptionIndex = null;
        let timerInterval = null;
        let timeLeft = 60;
        let activeTab = 'women'; // 'men' or 'women'

        // Leaderboard Mock Data (to be synced with backend)
        const leaderboardData = {
            women: [
                { name: 'نساء 1', points: 0, rank: '#1' },
                { name: 'نساء 2', points: 0, rank: '#5' },
                { name: 'نساء 3', points: 0, rank: '#6' }
            ],
            men: [
                { name: 'رجال 1', points: 0, rank: '#1' },
                { name: 'رجال 2', points: 0, rank: '#2' },
                { name: 'رجال 3', points: 0, rank: '#3' }
            ]
        };

        // Text Normalization Helper for Robust Comparison
        function normalizeText(str) {
            if (!str) return '';
            return String(str)
                .trim()
                .replace(/[\u064B-\u0652]/g, '') // Remove Arabic Harakat (Tashkeel)
                .replace(/[أإآ]/g, 'ا')
                .replace(/ة/g, 'ه')
                .replace(/ى/g, 'ي')
                .toLowerCase();
        }

        // Initialize App
        document.addEventListener('DOMContentLoaded', () => {
            fetchQuestions();
            setupEventListeners();
        });

        function setupEventListeners() {
            document.getElementById('top-leaderboard-btn').addEventListener('click', openLeaderboard);
            document.getElementById('close-modal-btn').addEventListener('click', closeLeaderboard);
            
            document.getElementById('tab-men').addEventListener('click', () => switchTab('men'));
            document.getElementById('tab-women').addEventListener('click', () => switchTab('women'));
        }

        // Fetch & Parse CSV Data
        function fetchQuestions() {
            Papa.parse(QUESTIONS_CSV_URL, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    if (results.data && results.data.length > 0) {
                        questionsData = results.data;
                        renderQuizScreen(questionsData[0]);
                    } else {
                        // Fallback sample question if CSV loading fails or is empty
                        renderQuizScreen({
                            'السؤال': 'ما هو أول مساجد الإسلام؟',
                            'الخيار 1': 'المسجد الحرام',
                            'الخيار 2': 'مسجد قِبار',
                            'الخيار 3': 'المسجد النبوي',
                            'الخيار 4': 'المسجد الأقصى',
                            'الإجابة الصحيحة': 'مسجد قِبار'
                        });
                    }
                },
                error: function(err) {
                    console.error("CSV Load Error:", err);
                    // Robust Fallback
                    renderQuizScreen({
                        'السؤال': 'ما هو أول مساجد الإسلام؟',
                        'الخيار 1': 'المسجد الحرام',
                        'الخيار 2': 'مسجد قِبار',
                        'الخيار 3': 'المسجد النبوي',
                        'الخيار 4': 'المسجد الأقصى',
                        'الإجابة الصحيحة': '2'
                    });
                }
            });
        }

        // Detect Correct Answer from Any CSV Column Name Variations
        function extractCorrectAnswer(qData) {
            if (!qData) return '';
            
            // Search for column keys dynamically
            const keys = Object.keys(qData);
            const correctKey = keys.find(k => {
                const normKey = normalizeText(k);
                return normKey.includes('صح') || normKey.includes('اجاب') || normKey.includes('correct') || normKey.includes('answer');
            });

            if (correctKey && qData[correctKey]) {
                return String(qData[correctKey]).trim();
            }

            // Default Fallbacks if key search fails
            return qData['الإجابة الصحيحة'] || qData['الاجابة الصحيحة'] || qData['Correct Answer'] || qData['Answer'] || '';
        }

        // Render Quiz Question View
        function renderQuizScreen(qData) {
            currentQuestion = qData;
            selectedOptionIndex = null;
            timeLeft = 60;

            const questionText = qData['السؤال'] || qData['Question'] || 'سؤال المسابقة اليومية';
            
            // Gather Options dynamically
            const options = [];
            for (let i = 1; i <= 4; i++) {
                const optVal = qData[`الخيار ${i}`] || qData[`Option ${i}`] || qData[`خيار ${i}`];
                if (optVal) options.push(optVal.trim());
            }

            const appCard = document.getElementById('app-card');
            appCard.innerHTML = `
                <!-- Timer Bar -->
                <div class="bg-amber-50 rounded-xl p-3 mb-6 flex justify-between items-center text-amber-800 font-bold text-sm border border-amber-200">
                    <span><i class="fas fa-clock text-amber-600 ml-1"></i> الوقت المتبقي:</span>
                    <span id="timer-display" class="text-lg font-extrabold text-amber-600">${timeLeft} ثانية</span>
                </div>

                <!-- Meta Category Header -->
                <div class="flex justify-between items-center text-xs font-bold text-indigo-600 mb-3">
                    <span>الفئة: رجال 1</span>
                    <span class="bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full border border-indigo-100">مسابقة رقم #1</span>
                </div>

                <!-- Question Title -->
                <h2 class="text-xl md:text-2xl font-bold text-slate-800 text-center my-6 leading-relaxed">
                    ${questionText}
                </h2>

                <!-- Options List -->
                <div class="space-y-3 mb-6" id="options-container">
                    ${options.map((opt, idx) => `
                        <button onclick="selectOption(${idx})" id="opt-btn-${idx}" 
                                class="w-full text-right p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-200 transition-all font-semibold text-slate-700 flex items-center justify-between group">
                            <span>${opt}</span>
                            <div class="w-5 h-5 rounded-full border-2 border-slate-300 group-hover:border-indigo-500 flex items-center justify-center">
                                <div class="w-2.5 h-2.5 rounded-full bg-indigo-600 hidden" id="radio-dot-${idx}"></div>
                            </div>
                        </button>
                    `).join('')}
                </div>

                <!-- Dynamic Evaluation Feedback Box -->
                <div id="feedback-box" class="hidden rounded-2xl p-4 text-center font-bold mb-6 transition-all duration-300"></div>

                <!-- Action Button -->
                <button id="submit-btn" disabled onclick="evaluateAndSubmit()" 
                        class="w-full py-4 bg-slate-300 text-slate-500 rounded-2xl font-bold text-lg shadow transition duration-200 flex items-center justify-center gap-2 cursor-not-allowed">
                    <i class="fas fa-save"></i> حفظ والخروج من المسابقة
                </button>
            `;

            startTimer();
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft--;
                const timerEl = document.getElementById('timer-display');
                if (timerEl) timerEl.textContent = `${timeLeft} ثانية`;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    evaluateAndSubmit();
                }
            }, 1000);
        }

        // Option Selection Handling
        window.selectOption = function(index) {
            selectedOptionIndex = index;
            const container = document.getElementById('options-container');
            const buttons = container.querySelectorAll('button');
            
            buttons.forEach((btn, idx) => {
                const dot = document.getElementById(`radio-dot-${idx}`);
                if (idx === index) {
                    btn.className = "w-full text-right p-4 rounded-2xl border-2 border-indigo-600 bg-indigo-50/50 transition-all font-bold text-indigo-900 flex items-center justify-between shadow-sm";
                    if (dot) dot.classList.remove('hidden');
                } else {
                    btn.className = "w-full text-right p-4 rounded-2xl border-2 border-slate-100 bg-white hover:border-indigo-200 transition-all font-semibold text-slate-700 flex items-center justify-between";
                    if (dot) dot.classList.add('hidden');
                }
            });

            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.className = "w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white rounded-2xl font-bold text-lg shadow-lg transition duration-200 flex items-center justify-center gap-2 cursor-pointer";
        };

        // Evaluation & Result Submission Logic
        window.evaluateAndSubmit = function() {
            clearInterval(timerInterval);

            // Extract Raw Correct Answer from CSV
            const rawCorrectVal = extractCorrectAnswer(currentQuestion);
            
            // Options list
            const options = [];
            for (let i = 1; i <= 4; i++) {
                const optVal = currentQuestion[`الخيار ${i}`] || currentQuestion[`Option ${i}`] || currentQuestion[`خيار ${i}`];
                if (optVal) options.push(optVal.trim());
            }

            let isCorrect = false;
            let displayCorrectAnswer = rawCorrectVal;

            // Robust Answer Matching
            if (selectedOptionIndex !== null && options[selectedOptionIndex]) {
                const userSelectedText = options[selectedOptionIndex];
                
                // Case 1: Raw Answer is Numeric Index (e.g. "1", "2", "3", "4")
                if (/^[1-4]$/.test(rawCorrectVal.trim())) {
                    const correctIdx = parseInt(rawCorrectVal.trim()) - 1;
                    displayCorrectAnswer = options[correctIdx] || rawCorrectVal;
                    if (selectedOptionIndex === correctIdx) isCorrect = true;
                } 
                // Case 2: Text Matching with Tashkeel Normalization
                else {
                    const normUser = normalizeText(userSelectedText);
                    const normCorrect = normalizeText(rawCorrectVal);
                    if (normUser === normCorrect || normUser.includes(normCorrect) || normCorrect.includes(normUser)) {
                        isCorrect = true;
                    }
                }
            }

            // UI Feedback Render
            const feedbackBox = document.getElementById('feedback-box');
            feedbackBox.classList.remove('hidden');

            if (isCorrect) {
                feedbackBox.className = "rounded-2xl p-4 text-center font-bold mb-6 bg-emerald-50 text-emerald-700 border border-emerald-200";
                feedbackBox.innerHTML = `<i class="fas fa-check-circle ml-1"></i> إجابة صحيحة! أحسنت صنعاً.`;
                updatePoints(10); // Award points
            } else {
                feedbackBox.className = "rounded-2xl p-4 text-center font-bold mb-6 bg-red-50 text-red-600 border border-red-200";
                feedbackBox.innerHTML = `<i class="fas fa-times-circle ml-1"></i> إجابة غير صحيحة. الإجابة الصحيحة هي: (${displayCorrectAnswer || 'غير محدودة'})`;
            }

            // Disable all option buttons
            const buttons = document.getElementById('options-container').querySelectorAll('button');
            buttons.forEach(b => b.disabled = true);

            // Change Submit button to Success / Finish view
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.onclick = renderSuccessScreen;
            submitBtn.innerHTML = `<i class="fas fa-arrow-left"></i> المتابعة للنتيجة`;
        };

        function updatePoints(pts) {
            leaderboardData.men[0].points += pts;
            leaderboardData.women[0].points += pts;
        }

        // Final Screen View
        function renderSuccessScreen() {
            const appCard = document.getElementById('app-card');
            appCard.innerHTML = `
                <div class="text-center py-8 space-y-6">
                    <div class="w-20 h-20 bg-emerald-500 text-white rounded-2xl flex items-center justify-center text-4xl mx-auto shadow-lg shadow-emerald-200">
                        <i class="fas fa-check"></i>
                    </div>
                    <div class="space-y-2">
                        <h2 class="text-2xl font-extrabold text-slate-800">تم تسجيل إجابتك بنجاح!</h2>
                        <p class="text-slate-500 font-medium">شكراً لمشاركتك. تم حفظ نتيجتك ونقاط فريقك بنجاح.</p>
                    </div>
                    <button onclick="openLeaderboard()" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-white rounded-2xl font-bold text-lg shadow-lg transition duration-200 flex items-center justify-center gap-2">
                        <i class="fas fa-trophy"></i> عرض لوحة الصدارة والترتيب
                    </button>
                </div>
            `;
        }

        // Leaderboard Modal Logic
        function openLeaderboard() {
            renderLeaderboardList();
            document.getElementById('leaderboard-modal').classList.remove('hidden');
        }

        function closeLeaderboard() {
            document.getElementById('leaderboard-modal').classList.add('hidden');
        }

        function switchTab(gender) {
            activeTab = gender;
            const tabMen = document.getElementById('tab-men');
            const tabWomen = document.getElementById('tab-women');

            if (gender === 'men') {
                tabMen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 bg-indigo-600 text-white shadow-md";
                tabWomen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 text-slate-600";
            } else {
                tabWomen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 bg-pink-600 text-white shadow-md";
                tabMen.className = "flex-1 py-2.5 rounded-lg font-bold text-sm transition-all duration-200 text-slate-600";
            }

            renderLeaderboardList();
        }

        function renderLeaderboardList() {
            const listContainer = document.getElementById('leaderboard-list');
            const items = leaderboardData[activeTab];

            listContainer.innerHTML = items.map(item => `
                <div class="flex items-center justify-between p-4 rounded-2xl ${item.rank === '#1' ? 'bg-amber-50 border border-amber-200' : 'bg-slate-50 border border-slate-100'}">
                    <div class="flex items-center gap-3">
                        <span class="text-xs font-extrabold text-amber-700 bg-amber-100 px-2 py-1 rounded-md">${item.rank}</span>
                        <span class="font-bold text-slate-800">${item.name}</span>
                    </div>
                    <div class="text-left">
                        <span class="text-lg font-black text-slate-900">${item.points}</span>
                        <span class="text-xs text-slate-400 block">نقاط</span>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
