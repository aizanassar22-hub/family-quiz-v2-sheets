<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المسابقة العائلية اليومية</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4f46e5',
                        secondary: '#312e81',
                        accent: '#f59e0b',
                    },
                    animation: {
                        'soft-pulse': 'softPulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        softPulse: {
                            '0%, 100%': { opacity: '1' },
                            '50%': { opacity: '0.85' },
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
        }
    </style>
</head>
<body class="min-h-screen text-slate-800 flex flex-col justify-between">

    <!-- Header / Navbar -->
    <header class="bg-gradient-to-r from-secondary to-primary text-white py-4 shadow-md">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <div class="flex items-center space-x-2 space-x-reverse">
                <span class="text-2xl">🏆</span>
                <h1 class="text-xl font-bold">المسابقة العائلية اليومية</h1>
            </div>
            <div class="text-xs bg-white/10 px-3 py-1 rounded-full backdrop-blur-sm" id="current-date">
                2026-07-23
            </div>
        </div>
    </header>

    <!-- Main Container -->
    <main class="container mx-auto px-4 py-6 flex-grow max-w-2xl">

        <!-- Global Timer Banner -->
        <div class="bg-secondary text-white rounded-2xl p-4 shadow-lg mb-6 flex justify-between items-center">
            <div>
                <span class="text-xs text-indigo-200 block">المؤقت الرئيسي للمسابقة (#001)</span>
                <span class="text-sm font-semibold">الوقت المتبقي لإغلاق جميع إجابات الجولة</span>
            </div>
            <div class="bg-primary/80 px-4 py-2 rounded-xl text-xl font-mono font-bold tracking-wider text-accent shadow-inner" id="main-timer">
                23:47:41
            </div>
        </div>

        <!-- Dynamic Content View Area -->
        <div id="app-view">
            <!-- سيتم حقن الواجهات هنا برمجياً -->
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-3 text-center text-xs text-slate-500">
        جميع الحقوق محفوظة - المسابقة العائلية اليومية &copy; 2026
    </footer>

    <!-- App Logic Script -->
    <script>
        // الحالة العامة للتطبيق
        const state = {
            currentScreen: 'home', // home, categories, questions, quiz, finished
            selectedCategory: null,
            participantId: '001',
            categoryStatus: {}
        };

        // دالة العرض الرئيسية
        function render() {
            const appView = document.getElementById('app-view');
            appView.innerHTML = '';

            switch (state.currentScreen) {
                case 'home':
                    appView.innerHTML = renderHomeScreen();
                    break;
                case 'questions':
                    appView.innerHTML = renderQuestionsScreen();
                    break;
                case 'quiz':
                    appView.innerHTML = renderQuizScreen();
                    break;
                case 'finished':
                    appView.innerHTML = renderFinishedScreen();
                    break;
            }
        }

        // 1. الشاشة الرئيسية (إعادة التصميم الأصلي الدقيق + الشريط التربوي فقط)
        function renderHomeScreen() {
            return `
                <!-- الشريط التربوي الجمالي الجديد -->
                <div class="mb-4 bg-amber-50 border border-amber-200/80 rounded-2xl p-3 text-center shadow-sm animate-soft-pulse">
                    <p class="text-amber-800 font-bold text-sm flex items-center justify-center gap-2">
                        <span>🏆</span> الفوز جميل... لكن التعلّم أجمل. <span>💡</span>
                    </p>
                </div>

                <!-- بطاقة الدخول الرئيسية المطابقة للتصميم الأصلي تماماً -->
                <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 text-center relative overflow-hidden">
                    
                    <!-- شارة دعوة للمشاركة الأصلية -->
                    <div class="bg-indigo-50 text-indigo-600 text-[11px] font-bold px-4 py-1 rounded-xl inline-block mb-3">
                        دعوة للمشاركة
                    </div>
                    
                    <h2 class="text-xl font-extrabold text-slate-800 mb-1">مرحباً بكم في مسابقة رقم #${state.participantId}</h2>
                    <p class="text-slate-400 text-xs mb-6 font-semibold">اختر الفئة المشاركة الخاصة بك للبدء في الإجابة</p>

                    <!-- فئات النساء -->
                    <div class="mb-6 text-right">
                        <div class="text-xs font-bold text-slate-600 mb-2">
                            <span>فئات النساء 👩 (10 فئات)</span>
                        </div>
                        <div class="grid grid-cols-5 gap-2">
                            ${Array.from({length: 10}, (_, i) => `
                                <button onclick="selectCategory('نساء ${i+1}')" class="bg-pink-50 hover:bg-pink-100 text-pink-700 text-xs font-semibold py-2.5 rounded-xl border border-pink-100 transition shadow-sm">
                                    نساء ${i+1}
                                </button>
                            `).join('')}
                        </div>
                    </div>

                    <!-- فئات الرجال -->
                    <div class="text-right">
                        <div class="text-xs font-bold text-slate-600 mb-2">
                            <span>فئات الرجال 👨 (10 فئات)</span>
                        </div>
                        <div class="grid grid-cols-5 gap-2">
                            ${Array.from({length: 10}, (_, i) => `
                                <button onclick="selectCategory('رجال ${i+1}')" class="bg-blue-50 hover:bg-blue-100 text-blue-700 text-xs font-semibold py-2.5 rounded-xl border border-blue-100 transition shadow-sm">
                                    رجال ${i+1}
                                </button>
                            `).join('')}
                        </div>
                    </div>
                </div>
            `;
        }

        // اختيار فئة والانتقال لصفحة الأسئلة
        function selectCategory(catName) {
            state.selectedCategory = catName;
            if (state.categoryStatus[catName]) {
                state.currentScreen = 'finished';
            } else {
                state.currentScreen = 'questions';
            }
            render();
        }

        // 2. شاشة الأسئلة (متضمنة زر العودة المعتمد)
        function renderQuestionsScreen() {
            const questionsList = [
                { id: 1, subject: 'علوم القرآن', title: 'ما هي السورة التي تسمى عروس القرآن؟' },
                { id: 2, subject: 'اللغة العربية', title: 'ما هو الفاعل في جملة: (كتب الطالب الدرس)؟' },
                { id: 3, subject: 'الرياضيات', title: 'ما حاصل ضرب العددين 12 في 11؟' },
                { id: 4, subject: 'العلوم', title: 'ما هو العنصر الكيميائي الذي رمزه (O)؟' },
                { id: 5, subject: 'التاريخ الإسلامي', title: 'في أي عام هجري وقعت غزوة بدر الكبرى؟' }
            ];

            return `
                <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 relative">
                    <div class="flex justify-between items-center mb-6 pb-3 border-b border-slate-100">
                        <button onclick="goBackToHome()" class="flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-xl transition font-semibold">
                            <span>←</span> العودة للفئات
                        </button>
                        <span class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full font-bold">
                            الفئة: ${state.selectedCategory}
                        </span>
                    </div>

                    <h3 class="font-bold text-slate-800 text-sm mb-1">اختر السؤال المناسب لك (10 أسئلة متوفرة):</h3>
                    <p class="text-slate-400 text-xs mb-4">يسمح لك بالإجابة على سؤال واحد فقط لحساب فئتك.</p>

                    <div class="space-y-3">
                        ${questionsList.map(q => `
                            <div class="flex items-center justify-between p-3 rounded-2xl border border-slate-100 bg-slate-50/50 hover:bg-slate-50 transition">
                                <div class="text-right">
                                    <span class="text-[10px] text-amber-600 bg-amber-50 px-2 py-0.5 rounded-md font-bold">${q.subject}</span>
                                    <h4 class="text-xs font-bold text-slate-800 mt-1">${q.title}</h4>
                                </div>
                                <button onclick="startQuiz(${q.id})" class="bg-primary hover:bg-indigo-700 text-white text-xs px-4 py-2 rounded-xl transition shadow-sm font-semibold flex items-center gap-1">
                                    <span>اختر السؤال</span> <span>›</span>
                                </button>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function goBackToHome() {
            state.currentScreen = 'home';
            render();
        }

        // 3. شاشة حل السؤال
        function renderQuizScreen() {
            return `
                <div class="bg-white rounded-3xl shadow-xl p-6 border border-slate-100 relative">
                    <div class="flex justify-between items-center mb-6 pb-3 border-b border-slate-100">
                        <button onclick="goBackToQuestions()" class="flex items-center gap-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs px-3 py-1.5 rounded-xl transition font-semibold">
                            <span>←</span> العودة للأسئلة
                        </button>
                        <span class="text-xs bg-indigo-50 text-indigo-700 px-3 py-1 rounded-full font-bold">
                            ${state.selectedCategory}
                        </span>
                    </div>

                    <div class="bg-amber-50/80 border border-amber-200 rounded-xl p-2.5 mb-4 flex justify-between items-center text-xs text-amber-800 font-semibold">
                        <span>⏱️ المؤقت الفرعي للسؤال:</span>
                        <span class="font-bold">13 ثانية</span>
                    </div>

                    <div class="text-right mb-6">
                        <span class="text-[10px] bg-indigo-50 text-indigo-600 px-2.5 py-1 rounded-lg font-bold">التخصص: علوم القرآن</span>
                        <h3 class="text-base font-bold text-slate-800 mt-2">ما هي السورة التي تسمى عروس القرآن؟</h3>
                    </div>

                    <div class="space-y-2.5 mb-6">
                        ${['سورة يس', 'سورة الرحمن', 'سورة الواقعة', 'سورة الملك'].map((opt) => `
                            <label class="flex items-center justify-between p-3 rounded-xl border border-slate-200 hover:border-primary cursor-pointer transition bg-white">
                                <span class="text-xs font-semibold text-slate-700">${opt}</span>
                                <input type="radio" name="quiz_answer" class="text-primary focus:ring-primary">
                            </label>
                        `).join('')}
                    </div>

                    <button onclick="submitAnswer()" class="w-full bg-primary hover:bg-indigo-700 text-white text-xs py-3 rounded-xl font-bold shadow-md transition">
                        📥 إرسال الإجابة وحفظ النتيجة
                    </button>
                </div>
            `;
        }

        function startQuiz(qId) {
            state.currentScreen = 'quiz';
            render();
        }

        function goBackToQuestions() {
            state.currentScreen = 'questions';
            render();
        }

        function submitAnswer() {
            state.categoryStatus[state.selectedCategory] = true;
            state.currentScreen = 'finished';
            render();
        }

        // 4. شاشة الانتهاء (تتضمن القفل المخصص لانتهاء المشاركة فقط + أزرار الخروج والعودة)
        function renderFinishedScreen() {
            return `
                <div class="bg-white rounded-3xl shadow-xl p-8 border border-slate-100 text-center">
                    <div class="w-16 h-16 bg-amber-50 rounded-2xl mx-auto flex items-center justify-center text-3xl shadow-sm mb-4">
                        🔒
                    </div>
                    
                    <h3 class="text-lg font-bold text-slate-800 mb-1">فئة (${state.selectedCategory}) شاركت بفعالية!</h3>
                    <p class="text-slate-500 text-xs mb-6">لقد تم تقديم إجابة هذه الفئة للمسابقة رقم #${state.participantId} سابقاً. يسمح لكل متسابق بإجابة سؤال واحد فقط.</p>

                    <div class="flex flex-col sm:flex-row gap-3 justify-center">
                        <button onclick="goBackToHome()" class="flex-1 bg-primary hover:bg-indigo-700 text-white text-xs py-3 px-4 rounded-xl font-bold transition shadow-md flex items-center justify-center gap-1">
                            <span>←</span> العودة لاختيار فئة أخرى
                        </button>
                        <button onclick="exitSession()" class="flex-1 bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs py-3 px-4 rounded-xl font-bold transition border border-slate-200 flex items-center justify-center gap-1">
                            <span>🚪</span> اضغط للخروج (خروج نهائي)
                        </button>
                    </div>
                </div>
            `;
        }

        function exitSession() {
            state.selectedCategory = null;
            state.currentScreen = 'home';
            render();
        }

        render();
    </script>
</body>
</html>
